<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZORO STEALTH ENCRYPTER</title>
    <style>
        body { background-color: #0d0d1a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #161b22; padding: 25px; border-radius: 15px; width: 90%; max-width: 420px; box-shadow: 0 0 25px rgba(0, 242, 255, 0.2); border: 1px solid #30363d; text-align: center; }
        h1 { color: #00f2ff; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { font-size: 11px; color: #8b949e; margin-bottom: 20px; }
        textarea { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid #00f2ff; border-radius: 10px; padding: 12px; color: white; box-sizing: border-box; outline: none; margin-bottom: 15px; font-size: 14px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        button { padding: 12px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-size: 12px; }
        
        #enc-btn { background: linear-gradient(45deg, #00f2ff, #00c2cb); color: black; }
        #dec-btn { background: linear-gradient(45deg, #ffcc00, #ff9900); color: black; }
        #copy-btn { background: linear-gradient(45deg, #ff00ff, #d400d4); color: white; grid-column: span 2; }
        
        .status-box { text-align: left; font-size: 11px; color: #00f2ff; margin-bottom: 5px; font-weight: bold; }
        #output-preview { border: 1px dashed #555; padding: 15px; border-radius: 10px; word-break: break-all; min-height: 40px; margin-bottom: 20px; font-size: 14px; background: rgba(255, 255, 255, 0.03); color: #00ff88; }
        
        .footer-links { margin-top: 10px; }
        .link { color: #8b949e; text-decoration: none; font-size: 12px; display: block; margin-top: 8px; }
        .link span { color: #ff00ff; }
    </style>
</head>
<body>

<div class="container">
    <h1>ZORO STEALTH</h1>
    <p class="subtitle">Visual Hide Mode — Works on everything</p>

    <textarea id="input-text" rows="4" placeholder="Type anything to Encrypt or paste Code to Decrypt..."></textarea>

    <div class="btn-grid">
        <button id="enc-btn" onclick="handleAction('encrypt')">Encrypt 🔐</button>
        <button id="dec-btn" onclick="handleAction('decrypt')">Decrypt 🔓</button>
        <button id="copy-btn" onclick="copyResult()">Copy Result 📋</button>
    </div>

    <div class="status-box" id="status-label">PREVIEW:</div>
    <div id="output-preview">Nothing processed yet...</div>

    <div class="footer-links">
        <a href="https://t.me/ZORO0687" target="_blank" class="link">Dev: <span>@ZORO0687</span></a>
    </div>
</div>

<script>
    let hiddenResult = ""; // Clipboard mein kya jayega woh yahan save hoga

    function handleAction(type) {
        const input = document.getElementById('input-text').value.trim();
        const preview = document.getElementById('output-preview');
        const status = document.getElementById('status-label');

        if (!input) {
            alert("Bhai, pehle kuch likho toh sahi!");
            return;
        }

        try {
            if (type === 'encrypt') {
                // 1. Encrypt logic (Base64)
                hiddenResult = btoa(unescape(encodeURIComponent(input)));
                // 2. Show original text on screen
                preview.innerText = input;
                status.innerText = "PREVIEW (Original Text - Ready to Copy Code):";
                preview.style.color = "#00ff88"; // Green for Encrypt
                alert("Encryption Done! Screen par text rahega par Copy code hoga.");
            } 
            else if (type === 'decrypt') {
                // 1. Decrypt logic
                hiddenResult = decodeURIComponent(escape(atob(input)));
                // 2. Show the code on screen
                preview.innerText = input;
                status.innerText = "PREVIEW (Code - Ready to Copy Plain Text):";
                preview.style.color = "#ffcc00"; // Yellow for Decrypt
                alert("Decryption Done! Screen par code rahega par Copy original text hoga.");
            }
        } catch (e) {
            alert("Error: Shayad aapne galat code paste kiya hai!");
        }
    }

    function copyResult() {
        if (hiddenResult === "") {
            alert("Copy karne ke liye pehle Encrypt ya Decrypt dabayein!");
            return;
        }

        navigator.clipboard.writeText(hiddenResult).then(() => {
            alert("Copied to clipboard!");
        }).catch(err => {
            alert("Copy fail ho gaya!");
        });
    }
</script>

</body>
</html>
