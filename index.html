<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZORO STEALTH PRO</title>
    <style>
        /* Gaming & Cyberpunk Style Background */
        body {
            background: #050505;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            color: white;
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(20, 20, 20, 0.95);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.1);
            border: 2px solid #333;
            text-align: center;
        }

        h1 {
            color: #00f2ff;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            font-size: 26px;
            text-shadow: 0 0 10px #00f2ff;
        }

        textarea {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            color: #1aff00;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        #enc-btn { background: #00f2ff; color: #000; }
        #dec-btn { background: #ffcc00; color: #000; }
        #copy-btn { 
            background: #ff00ff; 
            color: #fff; 
            grid-column: span 2; 
            font-size: 16px;
        }

        button:hover { opacity: 0.8; transform: translateY(-2px); }

        .label {
            text-align: left;
            font-size: 11px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        /* Preview Box */
        #output-preview {
            background: #111;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
            word-break: break-all;
            min-height: 40px;
            margin-bottom: 25px;
            font-size: 18px;
            font-weight: bold;
        }

        /* Footer Section */
        .footer {
            border-top: 1px solid #222;
            padding-top: 20px;
        }

        .tg-btn {
            display: block;
            background: #24A1DE;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .dev-link {
            color: #555;
            font-size: 12px;
            text-decoration: none;
        }
        .dev-link span { color: #ff00ff; }
    </style>
</head>
<body>

<div class="container">
    <h1>ZORO STEALTH</h1>

    <textarea id="input-text" rows="4" placeholder="Enter Text or Code..."></textarea>

    <div class="btn-grid">
        <button id="enc-btn" onclick="process('encrypt')">Encrypt 🔐</button>
        <button id="dec-btn" onclick="process('decrypt')">Decrypt 🔓</button>
        <button id="copy-btn" onclick="copyData()">Copy Result 📋</button>
    </div>

    <div class="label">System Output:</div>
    <div id="output-preview">Waiting for input...</div>

    <div class="footer">
        <a href="https://t.me/+MSGX1l0MBPIzZWI1" target="_blank" class="tg-btn">JOIN TELEGRAM CHANNEL</a>
        <a href="https://t.me/ZORO0687" target="_blank" class="dev-link">
            Developed by: <span>@ZORO0687</span>
        </a>
    </div>
</div>

<script>
    let finalOutput = ""; // Yeh asli data hold karega clipboard ke liye

    function process(mode) {
        const input = document.getElementById('input-text').value.trim();
        const preview = document.getElementById('output-preview');

        if (!input) {
            alert("Input field khali hai!");
            return;
        }

        try {
            if (mode === 'encrypt') {
                // Asli logic: Encrypt karo
                finalOutput = btoa(unescape(encodeURIComponent(input)));
                // Screen par wahi dikhao jo input tha
                preview.innerHTML = `<span style="color:#00f2ff">${input}</span>`;
                alert("Encrypted! Par Copy karne par code milega.");
            } 
            else if (mode === 'decrypt') {
                // Asli logic: Decrypt karo aur hidden save karo
                finalOutput = decodeURIComponent(escape(atob(input)));
                
                // SCREEN PAR SIRF AAPKA TAG DIKHEGA (Asli message hide ho jayega)
                preview.innerHTML = `<span style="color:#1aff00">TG:-@ZORO0687</span>`;
                
                alert("Decryption Done! Screen par tag dikhega par Copy asli message hoga.");
            }
        } catch (e) {
            alert("Error: Code galat hai!");
            preview.innerText = "Invalid Input";
            preview.style.color = "red";
        }
    }

    function copyData() {
        if (!finalOutput) {
            alert("Pehle process karein!");
            return;
        }

        navigator.clipboard.writeText(finalOutput).then(() => {
            alert("Successfully Copied to Clipboard!");
        });
    }
</script>

</body>
</html>
